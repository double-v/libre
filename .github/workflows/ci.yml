name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: libre_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/libre_test

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/libre_test

      - run: npx vitest run
        env:
          DATABASE_URL: postgresql://test:***@localhost:5432/libre_test
          NEXTAUTH_SECRET: test-secret-for-ci

      # Playwright E2E tests are intentionally DISABLED on CI for now.
      # Reason: the Vercel preview deploy used for E2E doesn't have the
      # same env config as prod (no real Turnstile key, different IPs
      # for rate-limiting, occasional cold-start flakes), and several
      # recent security fixes (Turnstile fail-closed, rate-limit on
      # /api/auth/*, isBanned check) need local validation before
      # being trusted to pass in CI. Track setup in the issue linked
      # from the project board. To re-enable:
      #   1. Run `npx playwright test` locally and ensure all tests pass
      #   2. Verify the Vercel preview env has the required secrets
      #   3. Uncomment the two steps below
      #
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps
      #
      # - run: npx playwright test
      #   env:
      #     DATABASE_URL: postgresql://test:***@localhost:5432/libre_test
      #     NEXTAUTH_SECRET: test-secret-for-ci