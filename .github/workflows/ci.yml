name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint job — jusqu'à #194 la CI ne lançait QUE vitest, donc les erreurs ESLint
  # (set-state-in-effect, rules-of-hooks, no-explicit-any…) étaient invisibles en
  # CI et pouvaient vivre sur main (cf. #193). Ce job échoue sur toute ERREUR
  # ESLint. Les warnings ne cassent pas le build (pas de --max-warnings) : ils
  # restent visibles dans les logs sans bloquer, à résorber progressivement.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Le client Prisma généré (src/generated/) est git-ignoré : on le régénère
      # pour que les imports `@/generated/client/*` résolvent pendant le lint.
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - run: npx eslint .

  test:
    runs-on: ubuntu-latest

    # Database: the DATABASE_URL secret is configured at the repo level
    # (Settings → Secrets and variables → Actions) and points at the dev
    # Neon database (user: neondb_owner). GH Actions does NOT auto-inject
    # repo secrets into process.env of a step — they have to be referenced
    # via ${{ secrets.DATABASE_URL }} in an env: block. Each step that
    # needs the database therefore has an explicit env: block. The
    # previous version of this workflow set the env via plain hardcoded
    # localhost:5432 which silently shadowed the secret and broke CI.
    # See #88 for the post-mortem.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - run: npx vitest run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: test-secret-for-ci

      # Playwright E2E tests are intentionally DISABLED on CI for now.
      # Reason: the Vercel preview deploy used for E2E doesn't have the
      # same env config as prod (no real Turnstile key, different IPs
      # for rate-limiting, occasional cold-start flakes), and several
      # recent security fixes (Turnstile fail-closed, rate-limit on
      # /api/auth/*, isBanned check) need local validation before
      # being trusted to pass in CI. Track setup in the issue linked
      # from the project board. To re-enable:
      #   1. Run `npx playwright test` locally and ensure all tests pass
      #   2. Verify the Vercel preview env has the required secrets
      #   3. Uncomment the two steps below
      #
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps
      #
      # - run: npx playwright test
      #   env:
      #     NEXTAUTH_SECRET: test-secret-for-ci
